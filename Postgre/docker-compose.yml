version: "3.8"

services:
  db:
    image: postgres:15
    container_name: postgresDataBase
    restart: unless-stopped
    environment:
       POSTGRES_USER: denisbiceps
       POSTGRES_PASSWORD: 12345678
       POSTGRES_DB: defaultDb
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
